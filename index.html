<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Matematyczny</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .progress {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .math-expr {
            font-style: italic;
            font-size: 22px;
            background-color: #eef2f3;
            padding: 12px;
            border-radius: 6px;
            display: inline-block;
            margin: 15px 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .option-btn {
            background-color: #fff;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            padding-left: 20px;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #3498db;
            background-color: #f7f9fa;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            min-height: 27px;
        }
        .correct { color: #27ae60; }
        .incorrect { color: #c0392b; }
        
        .next-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            display: none;
            font-weight: bold;
        }
        .next-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <h1 id="question-title">Zadanie</h1>
    <div class="progress" id="progress-text">Zadanie 1 z X</div>
    <p id="question-text">Treść pytania</p>
    
    <div id="math-box" class="math-expr">f(x) = ...</div>
    
    <div class="options-container" id="options-box">
        <!-- Przyciski wygenerują się automatycznie przez JavaScript -->
    </div>
    
    <div id="result"></div>
    <button class="next-btn" id="next-button" onclick="nextQuestion()">Następne zadanie ➡️</button>
</div>

<script>
// MIEJSCE NA TWOJE ZADANIA
// Możesz tu łatwo dopisywać kolejne sekcje wg schematu poniżej:
const questions = [
    {
        title: "Postać ogólna (Zadanie 1)",
        text: "Wskaż poprawną postać ogólną funkcji kwadratowej:",
        formula: "f(x) = 3(x + 2)² - 6",
        options: [
            "A) f(x) = 3x² + 6",
            "B) f(x) = 3x² + 12x + 18",
            "C) f(x) = 3x² + 12x + 6",
            "D) f(x) = 3x² + 4x + 6"
        ],
        correctIndex: 2 // Numer poprawnej opcji licząc od 0 (czyli 2 to opcja C)
    },
    {
        title: "Wierzchołek paraboli (Zadanie 2)",
        text: "Oblicz współrzędne wierzchołka W paraboli funkcji o wzorze:",
        formula: "f(x) = 2x² + 3x",
        options: [
            "A) W = (3/4, 9/8)",
            "B) W = (-3/4, -9/8)",
            "C) W = (-3/2, 0)",
            "D) f(x) = W = (-3/4, -3/8)"
        ],
        correctIndex: 0 // Poprawna to opcja B
    },
    {
        title: "Postać iloczynowa (Zadanie 3)",
        text: "Zapisz wzór funkcji kwadratowej w postaci iloczynowej:",
    formula: "f(x) = -2(x + 1)² + 8",
    options: [
        "A) f(x) = -2(x - 1)(x + 3)",
        "B) f(x) = -2(x + 1)(x - 3)",
        "C) f(x) = -2(x - 1)(x - 3)",
        "D) f(x) = -2(x + 2)(x - 4)"
        ],
        correctIndex: 1 // Poprawna to opcja A
    }
];

let currentQuestionIndex = 0;
let score = 0;
let hasAnswered = false;

function loadQuestion() {
    hasAnswered = false;
    const q = questions[currentQuestionIndex];
    
    document.getElementById("question-title").innerText = q.title;
    document.getElementById("progress-text").innerText = `Zadanie ${currentQuestionIndex + 1} z ${questions.length}`;
    document.getElementById("question-text").innerText = q.text;
    document.getElementById("math-box").innerText = q.formula;
    document.getElementById("result").innerText = "";
    document.getElementById("next-button").style.display = "none";
    
    const optionsBox = document.getElementById("options-box");
    optionsBox.innerHTML = "";
    
    q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = option;
        btn.onclick = () => checkAnswer(index, btn);
        optionsBox.appendChild(btn);
    });
}

function checkAnswer(selectedIndex, element) {
    if (hasAnswered) return; // Zapobiega wielokrotnemu klikaniu
    hasAnswered = true;
    
    const q = questions[currentQuestionIndex];
    const resultDiv = document.getElementById("result");
    const buttons = document.querySelectorAll(".option-btn");
    
    // Zablokuj wszystkie przyciski
    buttons.forEach(btn => btn.disabled = true);
    
    if (selectedIndex === q.correctIndex) {
        score++;
        resultDiv.innerHTML = "Brawo! To poprawna odpowiedź. ✨";
        resultDiv.className = "correct";
        element.style.borderColor = "#27ae60";
        element.style.backgroundColor = "#e8f8f5";
        element.style.color = "#27ae60";
    } else {
        resultDiv.innerHTML = "Niestety, to błąd. ❌";
        resultDiv.className = "incorrect";
        element.style.borderColor = "#c0392b";
        element.style.backgroundColor = "#fdebd0";
        element.style.color = "#c0392b";
        
        // Podświetl prawidłową odpowiedź, żeby uczeń się dowiedział, jaka była dobra
        buttons[q.correctIndex].style.borderColor = "#27ae60";
        buttons[q.correctIndex].style.backgroundColor = "#e8f8f5";
        buttons[q.correctIndex].style.color = "#27ae60";
    }
    
    document.getElementById("next-button").style.display = "block";
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
        loadQuestion();
    } else {
        showSummary();
    }
}

function showSummary() {
    const quizBox = document.getElementById("quiz-box");
    quizBox.innerHTML = `
        <h1>Koniec zadań!</h1>
        <p>Twój wynik to:</p>
        <div class="math-expr">${score} / ${questions.length} pkt</div>
        <p>${score === questions.length ? "Doskonale! Wszystko poprawnie. 🏆" : "Dobry trening! Pracuj dalej. 💪"}</p>
    `;
}

// Uruchomienie pierwszego pytania na starcie
loadQuestion();
</script>

</body>
</html>
